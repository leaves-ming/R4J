name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn -q -DskipTests compile

      - name: Unit And Architecture Tests
        run: mvn -q -Dtest=DocumentIdPolicyTest,ChunkIdPolicyTest,IngestionStateMachineTest,QueryProcessorTest,RrfFusionPolicyTest,ProviderConfigurationTest,EvaluationUsesRetrievalTopKTest,ArchitectureBoundaryTest test

      - name: Integration And Contract Tests
        run: mvn -q -Dtest=IngestionIntegrationTest,IngestionApiContractTest,RetrievalPipelineIntegrationTest,QueryApiContractTest,EvaluationPersistenceIntegrationTest,EvaluationApiContractTest test

      - name: Full Regression Suite
        run: mvn -q test
